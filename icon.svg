<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAA4D"/>
      <stop offset="100%" stop-color="#E68A2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9933" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF9933" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>

  <!-- Glow -->
  <circle cx="256" cy="256" r="220" fill="url(#glow)"/>

  <!-- Radiating lines - thick and visible -->
  <line x1="256" y1="256" x2="256" y2="60" stroke="#FF9933" stroke-width="6" stroke-opacity="0.35"/>
  <line x1="256" y1="256" x2="256" y2="452" stroke="#FF9933" stroke-width="6" stroke-opacity="0.35"/>
  <line x1="256" y1="256" x2="60" y2="256" stroke="#FF9933" stroke-width="6" stroke-opacity="0.35"/>
  <line x1="256" y1="256" x2="452" y2="256" stroke="#FF9933" stroke-width="6" stroke-opacity="0.35"/>
  <line x1="256" y1="256" x2="117" y2="117" stroke="#FF9933" stroke-width="5" stroke-opacity="0.25"/>
  <line x1="256" y1="256" x2="395" y2="117" stroke="#FF9933" stroke-width="5" stroke-opacity="0.25"/>
  <line x1="256" y1="256" x2="117" y2="395" stroke="#FF9933" stroke-width="5" stroke-opacity="0.25"/>
  <line x1="256" y1="256" x2="395" y2="395" stroke="#FF9933" stroke-width="5" stroke-opacity="0.25"/>

  <!-- Outer orbit ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FF9933" stroke-width="5" stroke-opacity="0.5"/>

  <!-- Middle orbit ring -->
  <circle cx="256" cy="256" r="115" fill="none" stroke="#FF9933" stroke-width="6" stroke-opacity="0.6"/>

  <!-- Inner orbit ring -->
  <circle cx="256" cy="256" r="55" fill="none" stroke="#FF9933" stroke-width="6" stroke-opacity="0.7"/>

  <!-- Outer orbital dots -->
  <circle cx="256" cy="76" r="18" fill="url(#saffron)"/>
  <circle cx="256" cy="436" r="18" fill="url(#saffron)"/>
  <circle cx="76" cy="256" r="18" fill="url(#saffron)"/>
  <circle cx="436" cy="256" r="18" fill="url(#saffron)"/>

  <!-- Middle orbital dots -->
  <circle cx="175" cy="175" r="14" fill="#FF9933" opacity="0.85"/>
  <circle cx="337" cy="175" r="14" fill="#FF9933" opacity="0.85"/>
  <circle cx="175" cy="337" r="14" fill="#FF9933" opacity="0.85"/>
  <circle cx="337" cy="337" r="14" fill="#FF9933" opacity="0.85"/>

  <!-- Core origin -->
  <circle cx="256" cy="256" r="32" fill="url(#saffron)"/>
  <circle cx="256" cy="256" r="16" fill="#0a0a0f"/>
  <circle cx="256" cy="256" r="8" fill="#FF9933"/>
</svg>